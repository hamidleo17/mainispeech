    <script>
      (function() {
        try {
          var localFetch = window.fetch;
          
          // Redefine window.fetch to support setting/writing
          try {
            Object.defineProperty(window, 'fetch', {
              get: function() {
                return localFetch;
              },
              set: function(v) {
                localFetch = v;
              },
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            console.warn("Could not redefine web fetch on window:", e);
          }

          // Also handle globalThis fetch if available
          if (typeof globalThis !== 'undefined' && globalThis !== window) {
            try {
              Object.defineProperty(globalThis, 'fetch', {
                get: function() {
                  return localFetch;
                },
                set: function(v) {
                  localFetch = v;
                },
                configurable: true,
                enumerable: true
              });
            } catch (e) {
              console.warn("Could not redefine web fetch on globalThis:", e);
            }
          }

          var proxyGlobal = new Proxy(window, {
            get: function(target, prop) {
              if (prop === 'fetch') {
                return localFetch;
              }
              var val = target[prop];
              if (typeof val === 'function') {
                if (/\{\s*\[native code\]\s*\}/.test(val.toString())) {
                  return val.bind(target);
                }
              }
              return val;
            },
            set: function(target, prop, value) {
              if (prop === 'fetch') {
                localFetch = value;
                return true;
              }
              try {
                target[prop] = value;
              } catch (e) {
                // Ignore read-only errors on window in strict mode
              }
              return true;
            }
          });
          Object.defineProperty(window, 'global', {
            value: proxyGlobal,
            writable: true,
            configurable: true
          });
          if (typeof globalThis !== 'undefined') {
            Object.defineProperty(globalThis, 'global', {
              value: proxyGlobal,
              writable: true,
              configurable: true
            });
          }
        } catch (e) {
          console.warn("Global proxy wrapper initialization bypassed:", e);
        }
      })();

      // Prevent and suppress benign WebSocket and Vite HMR errors in the preview environment
      window.addEventListener('unhandledrejection', function(event) {
        var str = String(event.reason || '');
        var msg = (event.reason && event.reason.message) || '';
        if (str.includes('WebSocket') || str.includes('websocket') || str.includes('vite') ||
            msg.includes('WebSocket') || msg.includes('websocket') || msg.includes('vite')) {
          event.preventDefault();
          event.stopPropagation();
        }
      });
      window.addEventListener('error', function(event) {
        var str = String(event.error || '');
        var msg = event.message || '';
        if (str.includes('WebSocket') || str.includes('websocket') || str.includes('vite') ||
            msg.includes('WebSocket') || msg.includes('websocket') || msg.includes('vite')) {
          event.preventDefault();
          event.stopPropagation();
